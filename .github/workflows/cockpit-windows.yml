name: Cockpit Windows Installer

# Manual trigger — Windows builds are slow/expensive, so run on demand.
# Produces NSIS (.exe) + MSI (.msi) installers as a downloadable artifact.
#
# NOTE (follow-up): this build does NOT yet bundle `harness-hook.exe`, so tool
# *approvals* won't fire in the installed app (gated tools are denied,
# fail-closed). Connect-project / start-session / streaming all work. Bundling
# the hook (externalBin via a tauri.windows.conf override) + a Windows
# `resolve_hook_path` fix (`.exe` suffix) is a tracked follow-up.
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend deps
        working-directory: apps/cockpit
        run: bun install

      - name: Build cockpit installer (tauri build)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tauri-action runs `beforeBuildCommand` (bun run build) + `cargo build` + bundling.
          projectPath: apps/cockpit

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: cockpit-windows-installer
          if-no-files-found: error
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
