version: 2
project_name: harness-router

builds:
  - id: harness-router-gnu-other
    builder: bun
    binary: hr
    main: apps/router/src/cli/index.ts
    targets:
      - linux-x64
      - linux-arm64
      - darwin-x64
      - darwin-arm64
      - windows-x64
    flags:
      - --compile
      - --minify

  - id: harness-router-musl
    builder: bun
    binary: hr
    main: apps/router/src/cli/index.ts
    targets:
      - linux-x64-musl
      - linux-arm64-musl
    flags:
      - --compile
      - --minify

archives:
  - id: default
    ids: [harness-router-gnu-other]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files: [README*]

  - id: musl
    ids: [harness-router-musl]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}_musl"
    files: [README*]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: alfin-efendy
    name: herness-router
  mode: append
  replace_existing_artifacts: true
